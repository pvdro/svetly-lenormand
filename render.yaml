# Render Blueprint — https://render.com
services:
  - type: web
    name: svetly-lenormand
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openrouter
      - key: LLM_MODEL
        value: google/gemma-4-26b-a4b-it:free
      - key: ALLOW_INSECURE_WEBAPP
        value: "0"
      - key: MINIAPP_URL
        fromService:
          name: svetly-lenormand
          type: web
          property: host

# fly.toml — https://fly.io
app = "svetly-lenormand"
primary_region = "fra"

[build]

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  ALLOW_INSECURE_WEBAPP = "0"
  LLM_PROVIDER = "openrouter"
  LLM_MODEL = "google/gemma-4-26b-a4b-it:free"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "lenormand_data"
  destination = "/app/data"
